<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pet Nest - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section" class="active">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            
            <p id="login-error" style="font-weight: bold; margin-bottom: 10px;"></p>
            
            <!-- FIXED: Using window.login() so it always finds the function -->
            <button onclick="window.login()">Login</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <nav class="sidebar">
            <h2>The Pet Nest</h2>
            <button onclick="showTab('dashboard-tab')">Dashboard Stats</button>
            <button onclick="showTab('add-tab')">Add New Pet</button>
            <button onclick="showTab('manage-tab')">Manage Pets</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </nav>

        <main class="content">
            
            <div id="dashboard-tab" class="tab-content active">
                <h2>Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Pets Listed</h3>
                        <p id="stat-total">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Pets Sold</h3>
                        <p id="stat-sold">0</p>
                    </div>
                </div>
            </div>

            <div id="add-tab" class="tab-content hidden">
                <h2>Add a New Pet</h2>
                <form id="add-pet-form" onsubmit="addPet(event)">
                    <input type="text" id="pet-name" placeholder="Pet Name (e.g., Golden Retriever puppy)" required>
                    <input type="number" id="pet-price" placeholder="Price (USD)" required>
                    
                    <select id="pet-category">
                        <option value="Dogs">Dogs</option>
                        <option value="Cats">Cats</option>
                        <option value="Birds">Birds</option>
                        <option value="Accessories">Accessories</option>
                    </select>

                    <select id="pet-status">
                        <option value="Available">Available</option>
                        <option value="Sold">Sold</option>
                    </select>
                    
                    <textarea id="pet-desc" placeholder="Pet Description..." rows="4"></textarea>
                    
                    <label>Upload Image/Video:</label>
                    <input type="file" id="pet-media" accept="image/*,video/*" required>
                    
                    <p id="upload-status" style="font-weight: bold; margin-bottom: 10px;"></p>
                    
                    <button type="submit" id="submit-btn">Upload Pet</button>
                </form>
            </div>

            <div id="manage-tab" class="tab-content hidden">
                <h2>Manage Inventory</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Media</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pets-table-body"></tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>

</body>
</html>
