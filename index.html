<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Admin (Temporary)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h2>Pet Admin (Temporary)</h2>
      <button id="logoutBtn" class="btn hidden">Logout</button>
    </div>

    <div id="loginCard" class="card">
      <h3>Admin Login</h3>
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <p id="loginMsg" class="small"></p>
    </div>

    <div id="app" class="hidden">
      <div class="card">
        <h3>Add Pet</h3>
        <div class="row">
          <input id="name" placeholder="Name" />
          <input id="price" type="number" placeholder="Price" />
        </div>
        <div class="row">
          <select id="category">
            <option>Sale</option>
            <option>Adoption</option>
            <option>Accessories</option>
          </select>
          <select id="status">
            <option value="available">Available</option>
            <option value="sold">Sold</option>
          </select>
        </div>
        <textarea id="description" placeholder="Description"></textarea>
        <input id="media" type="file" accept="image/*,video/*" />
        <button id="addPetBtn">Add Pet</button>
        <p id="addMsg" class="small"></p>
      </div>

      <div class="card">
        <h3>Pets List</h3>
        <table>
          <thead>
            <tr>
              <th>Media</th><th>Name</th><th>Price</th><th>Category</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="petsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
